<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Portal de Proveedores — SST</title>
  <link rel="stylesheet" href="css/global.css?v=2">
  <link rel="stylesheet" href="css/portal.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="overlay-loading" id="overlayLoading">
    <div class="spinner"></div>
  </div>

  <!-- UPLOAD LOADING OVERLAY -->
  <div id="uploadLoadingOverlay" style="display: none; position: fixed; inset: 0; background: rgba(15, 37, 68, 0.75); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="modal-box" style="max-width: 400px; text-align: center; padding: 2.5rem 2rem; border-radius: var(--radius-lg); background: white; box-shadow: var(--shadow-xl); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); display: block; width: 90%;">
      <div class="spinner" style="margin: 0 auto 1.5rem; width: 60px; height: 60px;"></div>
      <h3 style="color: var(--navy); font-family: var(--font-display); margin-bottom: 0.5rem; font-size: 1.2rem;">Enviando Documentos</h3>
      <p id="uploadOverlayStatus" style="color: var(--gray-600); font-size: 0.9rem; margin-bottom: 1.5rem;">Cargando archivos...</p>
      <div style="height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; margin-bottom: 0.5rem;">
        <div id="uploadOverlayProgress" style="height: 100%; background: linear-gradient(90deg, var(--navy-light), var(--success)); width: 0%; transition: width 0.3s ease;"></div>
      </div>
      <span id="uploadOverlayPct" style="font-size: 0.85rem; font-weight: bold; color: var(--navy-mid);">0%</span>
    </div>
  </div>

  <!-- TOPBAR -->
  <nav class="topbar">
    <div class="topbar-brand" style="display: flex; align-items: center; gap: 8px;">
      <span class="status-dot"></span>
      <img src="img/logo.png" alt="Ovopacific" style="height: 24px; filter: brightness(0) invert(1); display: inline-block;">
      Portal SST
    </div>
    <button class="topbar-back" onclick="window.location.href='index.html'">
      ← Volver al inicio
    </button>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>📝 Portal de Carga de Documentos</h1>
    <p>Sube los documentos de Seguridad y Salud en el Trabajo</p>
  </header>

  <!-- FORM -->
  <div class="form-outer">
    <form id="formPrincipal" onsubmit="return false;">

      <!-- SECCIÓN 1: DATOS DEL PROVEEDOR -->
      <div class="form-card">
        <div class="form-card-head">
          <div class="head-icon">👤</div>
          <h2>Información del Proveedor</h2>
        </div>
        <div class="form-card-body">
          <div class="grid-2">
            <div class="field">
              <label>Nombre del Proveedor <span class="req">*</span></label>
              <input type="text" id="fProveedor" class="input" placeholder="Ej: Servicios Técnicos XYZ" required>
            </div>
            <div class="field">
              <label>Nombre Responsable <span class="req">*</span></label>
              <input type="text" id="fResponsable" class="input" placeholder="Tu nombre completo" required>
            </div>
            <div class="field">
              <label>Número de Documento <span class="req">*</span></label>
              <input type="text" id="fDocumento" class="input" placeholder="Número de cédula" required>
            </div>
            <div class="field">
              <label>Empresa <span class="req">*</span></label>
              <input type="text" id="fEmpresa" class="input" placeholder="Nombre de tu empresa" required>
            </div>
          </div>
        </div>
      </div>

      <!-- SECCIÓN 2: ÁREA -->
      <div class="form-card">
        <div class="form-card-head">
          <div class="head-icon">🏗️</div>
          <h2>Área de Trabajo</h2>
        </div>
        <div class="form-card-body">
          <div class="field">
            <label>Selecciona tu área <span class="req">*</span></label>
            <select id="areaSelect" class="select" onchange="cargarRequisitos()" required>
              <option value="">— Selecciona un área —</option>
            </select>
          </div>
        </div>
      </div>

      <!-- SECCIÓN 3: DOCUMENTOS REQUERIDOS -->
      <div id="requisitosWrap" style="display:none;">
        <div class="form-card">
          <div class="form-card-head">
            <div class="head-icon">📁</div>
            <h2>Documentos Requeridos</h2>
          </div>
          <div class="form-card-body">
            <div id="requisitosList"></div>
          </div>
        </div>
      </div>

      <!-- BARRA DE PROGRESO -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- MENSAJE -->
      <div id="msgPortal" class="msg" style="margin: 1rem 0;"></div>

      <!-- ANTIBOT (CLOUDFLARE TURNSTILE) -->
      <div id="turnstileWrap" style="display:none; margin: 1.5rem 0; justify-content: center;">
        <div id="myTurnstileWidget"></div>
      </div>

      <!-- BOTÓN ENVIAR -->
      <div id="submitWrap" style="display:none;" class="submit-area">
        <button
          type="button"
          id="btnEnviar"
          class="btn btn-primary btn-lg btn-full"
          onclick="enviarFormulario()">
          📤 Enviar Documentos
        </button>
      </div>

    </form>
  </div>

  <!-- SCRIPTS (orden: config → api → lógica) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/areas.js"></script>
  <script src="js/portal.js"></script>

</body>
</html>
